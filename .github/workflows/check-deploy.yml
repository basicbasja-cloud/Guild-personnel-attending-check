name: Check Deploy Status

# Verify that the live GitHub Pages deployment is up to date with main.
# Compares the commit SHA embedded in the deployed /version.json against
# the current HEAD of the main branch.
on:
  schedule:
    - cron: '0 * * * *'   # run every hour
  push:
    branches: [main]       # also check whenever main is updated
  workflow_dispatch:       # allow manual trigger from the Actions tab

permissions:
  contents: read           # only needs read access to fetch commit metadata

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest main SHA
        id: main_sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/main" \
            | jq -r .sha)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Latest main SHA: $SHA"

      - name: Get deployed SHA from live site
        id: deployed_sha
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.repository }}"
          REPO_SLUG="${REPO_NAME#*/}"   # strip the "owner/" prefix

          HTTP_STATUS=$(curl -o /tmp/version.json -w "%{http_code}" -fsSL \
            "https://${REPO_OWNER}.github.io/${REPO_SLUG}/version.json" || true)

          if [ "$HTTP_STATUS" = "200" ]; then
            DEPLOYED=$(jq -r .sha /tmp/version.json)
            echo "sha=$DEPLOYED" >> "$GITHUB_OUTPUT"
            echo "Deployed SHA: $DEPLOYED"
          else
            echo "⚠️  version.json not found on the live site (HTTP $HTTP_STATUS)."
            echo "   The site may not have been built with the version-embedding plugin yet."
            echo "   Run 'npm run deploy' from the main branch to publish a versioned build."
            exit 1
          fi

      - name: Compare and report
        run: |
          MAIN_SHA="${{ steps.main_sha.outputs.sha }}"
          DEPLOYED_SHA="${{ steps.deployed_sha.outputs.sha }}"

          echo "Latest main SHA : $MAIN_SHA"
          echo "Deployed SHA    : $DEPLOYED_SHA"

          if [ "$MAIN_SHA" = "$DEPLOYED_SHA" ]; then
            echo "✅ Deploy is up to date."
          else
            echo "⚠️  Deploy is STALE — the live site does not reflect the latest commit on main."
            echo "   Run 'npm run deploy' from the main branch to update the deployment."
            exit 1
          fi
